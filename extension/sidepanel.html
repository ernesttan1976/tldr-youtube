<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TLDR YouTube</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="row">
        <div class="title">TLDR YouTube (Local)</div>
        <button id="refreshBtn">Refresh</button>
      </div>

        <div class="card">
          <div class="row">
            <div class="label">Video</div>
            <div id="videoInfo" class="mono">(not loaded)</div>
          </div>
          <div class="row">
            <button id="attachBtn">Attach To Current Tab</button>
            <button id="syncAuthBtn">Sync Login</button>
            <button id="generateBtn">Generate Draft</button>
            <button id="exportBtn">Export PDFs</button>
          </div>
          <div id="status" class="status"></div>
        </div>

      <div class="card">
        <div class="row">
          <div class="label">Markdown Files</div>
          <select id="mdSelect"></select>
          <button id="loadMdBtn">Load</button>
          <button id="saveMdBtn">Save</button>
        </div>
        <textarea id="mdEditor" spellcheck="false" placeholder="Markdown will appear here..."></textarea>
      </div>

      <div class="card">
        <div class="row">
          <div class="label">Screenshots</div>
          <button id="shotBtn">Capture Now</button>
          <select id="burstInterval">
            <option value="0.5">0.5s</option>
            <option value="1" selected>1s</option>
            <option value="2">2s</option>
            <option value="5">5s</option>
          </select>
          <button id="burstBtn">Burst ±10s</button>
        </div>
        <div id="shots" class="shots"></div>
      </div>
    </div>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
