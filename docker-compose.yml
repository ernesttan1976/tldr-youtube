services:
  backend:
    build:
      context: ./backend
    container_name: tldr-youtube-backend
    ports:
      - "127.0.0.1:4711:4711"
    environment:
      - DATA_DIR=/data
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - OPENAI_TIMEOUT_SEC=${OPENAI_TIMEOUT_SEC:-600}
      - OPENAI_MAX_RETRIES=${OPENAI_MAX_RETRIES:-2}
      - ASR_PROVIDER=${ASR_PROVIDER:-openai}
      - ASR_LANGUAGE=${ASR_LANGUAGE:-en}
      - LOCAL_ASR_MODEL=${LOCAL_ASR_MODEL:-small.en}
      - LOCAL_ASR_DEVICE=${LOCAL_ASR_DEVICE:-cpu}
      - LOCAL_ASR_COMPUTE_TYPE=${LOCAL_ASR_COMPUTE_TYPE:-int8}
      - HOST=0.0.0.0
      - PORT=4711
      - ALLOW_ORIGINS=${ALLOW_ORIGINS:-*}
    volumes:
      - ./data:/data
